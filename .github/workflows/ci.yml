name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Go test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Run tests
        run: go test ./...

      - name: Build CLI
        run: go build ./cmd/hermeneia
